<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>OG Card Template</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        width: 1200px;
        height: 630px;
        overflow: hidden;
        background: #111;
      }

      .card {
        position: relative;
        width: 1200px;
        height: 630px;
        overflow: hidden;
        background: var(--bg);
        color: var(--text);
        font-family: Inter, sans-serif;
      }

      .card.bg-flat {
        background: var(--bg);
      }

      .card.bg-gradient-soft {
        background: linear-gradient(
          160deg,
          #ffffff 0%,
          color-mix(in srgb, var(--line) 5%, var(--bg)) 38%,
          var(--bg) 68%,
          color-mix(in srgb, var(--line) 12%, var(--bg)) 100%
        );
      }

      /* Neutral gray cards (opensource, etc.) need a stronger wash */
      .card.bg-muted.bg-gradient-soft {
        background: linear-gradient(
          160deg,
          #ffffff 0%,
          color-mix(in srgb, var(--line) 10%, #f6f6f6) 32%,
          color-mix(in srgb, var(--line) 6%, var(--bg)) 62%,
          color-mix(in srgb, var(--line) 24%, var(--bg)) 100%
        );
      }

      .card.bg-gradient-diagonal {
        background: linear-gradient(
          135deg,
          #ffffff 0%,
          color-mix(in srgb, var(--line) 4%, white) 24%,
          var(--bg) 72%,
          color-mix(in srgb, var(--line) 10%, var(--bg)) 100%
        );
      }

      .card.bg-muted.bg-gradient-diagonal {
        background:
          radial-gradient(
            ellipse 95% 85% at 0% 0%,
            #ffffff 0%,
            rgba(255, 255, 255, 0) 38%
          ),
          linear-gradient(
            135deg,
            color-mix(in srgb, var(--line) 6%, white) 12%,
            color-mix(in srgb, var(--line) 8%, var(--bg)) 38%,
            var(--bg) 52%,
            color-mix(in srgb, var(--line) 18%, var(--bg)) 100%
          );
      }

      .card.bg-gradient-bottom {
        background: linear-gradient(
          to top,
          color-mix(in srgb, var(--line) 16%, var(--bg)) 0%,
          var(--bg) 30%,
          #ffffff 100%
        );
      }

      .card.bg-gradient-sky {
        background: linear-gradient(
          180deg,
          color-mix(in srgb, var(--line) 6%, white) 0%,
          var(--bg) 42%,
          #ffffff 100%
        );
      }

      .card.bg-gradient-frame::before {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(
          180deg,
          color-mix(in srgb, var(--line) 14%, transparent) 0%,
          transparent 14%,
          transparent 86%,
          color-mix(in srgb, var(--line) 12%, transparent) 100%
        );
        pointer-events: none;
      }

      .card.bg-gradient-frame {
        background: var(--bg);
      }

      .icon-watermark {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0.1;
        pointer-events: none;
        color: var(--line);
      }

      .icon-watermark svg {
        width: 280px;
        height: 280px;
      }

      .type-signal {
        display: none;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        color: var(--line);
      }

      .card.signal-corner .type-signal {
        display: inline-flex;
        width: 48px;
        height: 48px;
        border-radius: 50%;
        border: 2px solid color-mix(in srgb, var(--line) 35%, transparent);
        background: color-mix(in srgb, var(--line) 8%, white);
      }

      .card.signal-corner .type-signal svg {
        width: 26px;
        height: 26px;
      }

      .card.signal-overlay .type-signal {
        display: flex;
        align-items: center;
        justify-content: center;
        right: 96px;
        top: 50%;
        transform: translateY(-50%);
        width: 112px;
        height: 112px;
        border-radius: 50%;
        background: color-mix(in srgb, var(--line) 14%, white);
        border: 4px solid color-mix(in srgb, var(--line) 28%, transparent);
      }

      .card.signal-overlay .type-signal svg {
        width: 52px;
        height: 52px;
      }

      .content {
        position: relative;
        z-index: 1;
        display: flex;
        height: 100%;
        flex-direction: column;
        justify-content: space-between;
        padding: 80px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 18px;
        font-size: 22px;
        font-weight: 600;
        letter-spacing: 0.02em;
      }

      .brand img {
        width: 56px;
        height: 56px;
        border-radius: 50%;
        object-fit: cover;
        border: 2px solid color-mix(in srgb, var(--line) 25%, white);
      }

      .brand-copy {
        display: flex;
        flex: 1;
        align-items: center;
        justify-content: space-between;
        min-width: 0;
      }

      .brand-copy span {
        opacity: 0.72;
      }

      .category {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 18px;
        margin-top: 12px;
      }

      .category-line {
        width: 72px;
        height: 3px;
        background: var(--line);
        border-radius: 999px;
      }

      .category-label {
        font-size: 20px;
        font-weight: 700;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: var(--line);
      }

      .title-block {
        max-width: 920px;
      }

      .title {
        font-family: Montserrat, sans-serif;
        font-size: 54px;
        font-weight: 700;
        line-height: 1.12;
        letter-spacing: -0.02em;
        color: #1b1c1c;
      }

      .subtitle {
        margin-top: 14px;
        font-size: 28px;
        font-weight: 500;
        line-height: 1.3;
        color: rgba(27, 28, 28, 0.72);
      }

      .card.subtitle-refined .subtitle {
        font-size: 24px;
        font-weight: 400;
        line-height: 1.35;
        color: rgba(27, 28, 28, 0.58);
      }

      .footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        min-height: 48px;
        font-size: 18px;
        font-weight: 600;
        color: rgba(27, 28, 28, 0.55);
        gap: 24px;
      }



      .type-pill {
        border: 2px solid var(--line);
        border-radius: 999px;
        padding: 8px 18px;
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--line);
        flex-shrink: 0;
      }

      .footer-category {
        font-size: 18px;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--line);
      }

      .card.bg-muted .footer-category,
      .card.bg-muted .brand strong,
      .card.bg-muted .brand-copy span {
        color: #3a3a3a;
      }

      .footer-note {
        margin-left: auto;
      }

      .card.layout-footer-category .category {
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="card" id="card">
      <div class="icon-watermark" id="watermark"></div>
      <div class="content">
        <div>
          <div class="brand">
            <img id="logo" alt="" />
            <div class="brand-copy">
              <strong>Jessica Temporal</strong>
              <span>jtemporal.com</span>
            </div>
          </div>
          <div class="category" id="category">
            <div class="category-line"></div>
            <div class="category-label" id="label">pro tip</div>
            <div class="category-line"></div>
          </div>
        </div>

        <div class="title-block">
          <h1 class="title" id="title">Post title goes here</h1>
          <p class="subtitle" id="subtitle" hidden></p>
        </div>

        <div class="footer" id="footer">
          <span id="type-pill" class="type-pill">post</span>
          <span class="footer-category" id="footer-category" hidden></span>
          <span class="type-signal" id="type-signal"></span>
        </div>
      </div>
    </div>

    <script src="icons.js"></script>
    <script>
      const params = new URLSearchParams(window.location.search);

      const card = {
        title: params.get('title') || 'Post title goes here',
        subtitle: params.get('subtitle') || '',
        tagLabel: params.get('label') || 'pro tip',
        icon: params.get('icon') || 'school',
        line: params.get('line') || '#b80049',
        text: params.get('text') || '#b80049',
        bg: params.get('bg') || '#fff5f7',
        type: params.get('type') || 'post',
        layout: params.get('layout') || 'classic',
        bgStyle: params.get('bgStyle') || 'flat',
        signal: params.get('signal') || 'none',
        subtitleStyle: params.get('subtitleStyle') || 'default',
        logo: params.get('logo') || '',
      };

      const root = document.getElementById('card');
      root.style.setProperty('--bg', card.bg);
      root.style.setProperty('--line', card.line);
      root.style.setProperty('--text', card.text);

      const bgClass = card.bgStyle === 'flat' ? 'bg-flat' : `bg-${card.bgStyle}`;
      root.classList.add(bgClass);
      root.classList.add(`type-${card.type}`);
      const mutedBgs = new Set(['#efeded', '#e9e8e7', '#f5f3f3', '#e3e2e2']);
      if (mutedBgs.has(card.bg.toLowerCase())) root.classList.add('bg-muted');
      if (card.layout === 'footer-category') root.classList.add('layout-footer-category');
      if (card.subtitleStyle === 'refined') root.classList.add('subtitle-refined');
      if (card.signal === 'corner') root.classList.add('signal-corner');
      if (card.signal === 'overlay') root.classList.add('signal-overlay');

      document.getElementById('title').textContent = card.title;
      document.getElementById('label').textContent = card.tagLabel;
      document.getElementById('type-pill').textContent = card.type;

      if (card.type === 'video' || card.type === 'talk') {
        document.getElementById('category').hidden = true;
      }

      const iconSvg = window.OG_ICONS[card.icon] || window.OG_ICONS.menu_book;
      document.getElementById('watermark').innerHTML = iconSvg;

      const subtitle = document.getElementById('subtitle');
      if (card.subtitle) {
        subtitle.textContent = card.subtitle;
        subtitle.hidden = false;
      }

      const footerCategory = document.getElementById('footer-category');

      if (card.type === 'post') {
        footerCategory.textContent = card.tagLabel;
        footerCategory.hidden = false;
      }

      if (card.signal !== 'none' && (card.type === 'video' || card.type === 'talk')) {
        const signalIcon = card.type === 'video' ? window.OG_ICONS.play_arrow : window.OG_ICONS.mic;
        document.getElementById('type-signal').innerHTML = signalIcon;
      }

      if (card.logo) {
        document.getElementById('logo').src = card.logo;
      }
    </script>
  </body>
</html>
