<!-- Lil Jess: always-visible sidekick. Dismiss with ✕; re-summon by typing "jess" or 5 footer taps. -->
<style>
  #lil-jess {
    position: fixed;
    right: 1.25rem;
    bottom: 1.25rem;
    z-index: 90;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    pointer-events: none;
  }
  /* display:flex above beats the UA [hidden] rule without this. */
  #lil-jess[hidden],
  #lil-jess [hidden] { display: none !important; }
  #lil-jess > * { pointer-events: auto; }

  #lil-jess .lj-bubble {
    max-width: 220px;
    margin-bottom: 0.5rem;
    padding: 0.5rem 0.85rem;
    border-radius: 1rem;
    border-bottom-right-radius: 0.25rem;
    background: #fff;
    color: #1f1f1f;
    font-size: 0.875rem;
    line-height: 1.35;
    box-shadow: 0 4px 16px rgba(0, 0, 0, 0.18);
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 0.25s ease, transform 0.25s ease;
  }
  #lil-jess .lj-bubble.lj-show { opacity: 1; transform: translateY(0); }
  .dark #lil-jess .lj-bubble { background: #2b2930; color: #e6e1e5; }

  #lil-jess .lj-char {
    position: relative;
    width: 76px;
    height: 76px;
    padding: 0;
    border: none;
    background: none;
    cursor: pointer;
    transform: translateY(140%);
    transition: transform 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
    -webkit-tap-highlight-color: transparent;
  }
  #lil-jess.lj-in .lj-char { transform: translateY(0); }

  #lil-jess .lj-char img,
  #lil-jess .lj-char .lj-fallback {
    width: 100%;
    height: 100%;
    display: block;
    filter: drop-shadow(0 3px 6px rgba(0, 0, 0, 0.25));
    user-select: none;
  }
  #lil-jess .lj-char .lj-fallback {
    font-size: 56px;
    line-height: 76px;
    text-align: center;
  }

  #lil-jess .lj-char.lj-bounce { animation: lj-bounce 0.5s ease; }
  @keyframes lj-bounce {
    0%   { transform: translateY(0) scale(1); }
    35%  { transform: translateY(-14px) scale(1.08); }
    70%  { transform: translateY(0) scale(0.96); }
    100% { transform: translateY(0) scale(1); }
  }

  /* Anchored to the character so it leaves with her on dismiss. */
  #lil-jess .lj-close {
    position: absolute;
    /* .lj-char is 76px; pin the ✕ to its top-right corner. */
    bottom: calc(76px - 0.25rem);
    right: -0.25rem;
    width: 22px;
    height: 22px;
    border: none;
    border-radius: 50%;
    background: rgba(0, 0, 0, 0.55);
    color: #fff;
    font-size: 13px;
    line-height: 1;
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.2s ease, transform 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
    /* Match .lj-char's off-screen start so they enter/exit together. */
    transform: translateY(140%);
  }
  #lil-jess.lj-in .lj-close { transform: translateY(0); }
  #lil-jess.lj-in:hover .lj-close,
  #lil-jess.lj-in:focus-within .lj-close { opacity: 1; }
  /* Touch screens have no hover — keep the dismiss button visible while she's in. */
  @media (hover: none) {
    #lil-jess.lj-in .lj-close { opacity: 0.85; }
  }

  #lil-jess .lj-confetti {
    position: absolute;
    width: 8px;
    height: 12px;
    border-radius: 2px;
    top: 10%;
    left: 50%;
    pointer-events: none;
  }

  @media (prefers-reduced-motion: reduce) {
    #lil-jess .lj-char { transition: none; }
    #lil-jess .lj-char.lj-bounce { animation: none; }
    #lil-jess .lj-bubble { transition: opacity 0.2s ease; transform: none; }
    #lil-jess .lj-close { transition: opacity 0.2s ease; }
  }
</style>

<div id="lil-jess" data-img-base="{{ '/images/emojis/' | relative_url }}" data-layout="{{ page.layout }}" hidden>
  <div class="lj-bubble" role="status" hidden></div>
  <button class="lj-close" type="button" aria-label="Dismiss">&times;</button>
  <button class="lj-char" type="button" aria-label="Lil Jess">
    <img alt="" draggable="false">
    <span class="lj-fallback" aria-hidden="true" hidden></span>
  </button>
</div>

<script src="{{ '/assets/js/lil-jess.js' | relative_url }}" defer></script>
