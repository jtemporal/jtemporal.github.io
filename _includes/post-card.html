<article class="group overflow-hidden rounded-2xl border bg-surface-container-lowest shadow-cozy transition-all duration-500 hover:-translate-y-1 hover:shadow-xl dark:bg-inverse-surface {% if post.lang == 'pt' %}border-2 border-primary/25 dark:border-primary/40{% else %}border border-outline-variant dark:border-outline{% endif %}">
  <a href="{{ post.url | relative_url }}" class="block">
    {% include post-tag-banner.html post=post %}
    <div class="p-6">
      <p class="mb-2 font-sans text-xs font-semibold uppercase tracking-wider {% if post.lang == 'pt' %}text-primary{% else %}text-on-surface-variant{% endif %}">
        {{ post.date | date: "%b %-d, %Y" }}
      </p>
      <h3 class="font-display text-headline-sm leading-tight text-on-surface transition-colors group-hover:text-primary dark:text-inverse-on-surface">
        {{ post.title }}{% if post.subtitle %}: {{ post.subtitle }}{% endif %}
      </h3>
      <p class="mt-3 line-clamp-2 font-sans text-body-md text-on-surface-variant dark:text-inverse-on-surface/70">
        {% if post.description %}
          {{ post.description }}
        {% else %}
          {{ post.excerpt | strip_html | strip_newlines | truncate: 120 }}
        {% endif %}
      </p>
    </div>
  </a>
</article>
