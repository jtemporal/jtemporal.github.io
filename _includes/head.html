<head>
  {% include theme-init.html %}
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  {% if page.tags %}
    <meta name="keywords" content="{{ page.tags | join: ', ' }}">
  {% endif %}

  {% seo %}

  {% include fonts.html %}

  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}?v={{ site.time | date: '%s' }}">
  <link rel="icon" type="image/x-icon" href="{{ site.favicon | relative_url }}">
  <link rel="apple-touch-icon" href="{{ site.applefavicon | relative_url }}">
  <link rel="alternate" type="application/rss+xml" title="{{ site.title }}{% if site.subtitle %}: {{ site.subtitle }}{% endif %}" href="{{ '/feed.xml' | relative_url }}">

  <script src="{{ '/assets/js/theme.js' | relative_url }}" defer></script>
</head>
