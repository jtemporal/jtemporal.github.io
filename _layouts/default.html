---
layout: compress
---

<!DOCTYPE html>
<html lang="{{ page.lang | default: site.default_language }}">
  {% include head.html %}

  <body>
    {% include header.html %}

    <main>
      {{ content }}
    </main>

    {% include footer.html %}

    <script src="{{ '/js/copy-code.js' | relative_url }}"></script>
    {% if site.analytics %}{% include analytics.html %}{% endif %}

    {% if page.mermaid %}
    <script type="module">
      import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
      mermaid.initialize({
        startOnLoad: true,
        theme: document.documentElement.classList.contains('dark') ? 'dark' : 'default'
      });
    </script>
    {% endif %}
  </body>
</html>
